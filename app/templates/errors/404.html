<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BrightHaven Smart Home — Page not found">
    <title>404 — BrightHaven</title>
    <link rel="icon" href="/static/images/pr1.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="auth-page" style="background: radial-gradient(circle at center, #111827 0%, #050505 100%);">
    <div class="glass-card auth-card" style="text-align:center; padding: 55px; border-radius: 34px; box-shadow: 0 21px 55px rgba(0,0,0,0.6);">
        <div style="font-size:8rem; font-family:'Playfair Display', serif; color:var(--gold); opacity:0.1; position:absolute; top:-20px; left:20px; z-index:0">404</div>
        <div style="position:relative; z-index:1">
            <div style="font-size:5rem;color:var(--gold);margin-bottom:21px; animation: float 3s ease-in-out infinite">
                <i class="bi bi-compass"></i>
            </div>
            <h1 style="font-family:'Playfair Display',serif;font-size:3.5rem;margin-bottom:13px; letter-spacing:-2px">Lost in Space</h1>
            <p style="color:var(--text-muted);font-size:1.1rem;margin-bottom:34px; line-height:1.6">
                The page you seek has vanished into the digital void.<br>
                Error Code: <span style="color:var(--gold);font-weight:700">0xFib404</span>
            </p>
            <div style="display:flex; gap:13px; justify-content:center">
                <a href="/" class="btn btn-primary" style="width:auto;padding:13px 34px; border-radius:13px">
                    <i class="bi bi-house-door"></i> <span>Return Home</span>
                </a>
                <a href="javascript:history.back()" class="btn btn-secondary" style="width:auto;padding:13px 34px; border-radius:13px">
                    <i class="bi bi-arrow-left"></i> <span>Go Back</span>
                </a>
            </div>
        </div>
    </div>
</div>

<style>
@keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-13px) rotate(5deg); }
}
/* Fibonacci spacing utilized: 8, 13, 21, 34, 55, 89 */
</style>
</body>
</html>
